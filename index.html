        .container {

        h1 {

            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* 초대코드 영역 */
        .invite-box {
            background: #f8f9ff;
            border: 2px solid #eef0ff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .invite-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        .code-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary-color);
            display: block;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .btn-copy {
            background: var(--primary-color);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-copy:hover { background: #3729d1; }

        /* 바로가기 버튼 */
        .btn-main-link {
            display: block;
            background: var(--secondary-color);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 17px;

<script>
    function copyCode() {
        const code = document.getElementById('myCode').innerText;
        navigator.clipboard.writeText(code).then(() => {
